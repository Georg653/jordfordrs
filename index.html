<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jordfordrs</title>
  <link rel="icon" type="image/png" href="jordfordrs.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes logo-pop {
      0% { transform: scale(0.75); opacity: 0; }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111113;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 24px 110px;
      font-family: 'Inter', -apple-system, sans-serif;
      position: relative;
      overflow-x: hidden;
    }
    canvas#particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .glow-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 280px;
      background: linear-gradient(to top,
        rgba(210,25,25,0.75) 0%,
        rgba(180,15,15,0.36) 42%,
        transparent 100%);
      z-index: 0;
      animation: glow-pulse 2.4s ease-in-out infinite;
      pointer-events: none;
    }
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      width: 100px;
      height: 100px;
      border-radius: 26px;
      object-fit: cover;
      margin-bottom: 16px;
      animation: logo-pop 0.55s cubic-bezier(.22,1,.36,1) forwards;
      box-shadow: 0 0 30px rgba(200,30,30,0.2);
      border: 1.5px solid rgba(200,30,30,0.4);
    }
    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      color: #ffffff;
      letter-spacing: 3px;
      margin-bottom: 5px;
      line-height: 1;
      animation: slide-in 0.45s ease 0.1s both;
    }
    .bio {
      font-size: 13px;
      color: #666;
      letter-spacing: 0.3px;
      margin-bottom: 40px;
      text-align: center;
      animation: slide-in 0.45s ease 0.18s both;
    }
    .btns {
      display: flex;
      flex-direction: column;
      gap: 11px;
      width: 100%;
    }
    .btn {
      display: flex;
      align-items: center;
      gap: 13px;
      background: #1a1a1e;
      border: 1px solid rgba(200,30,30,0.32);
      color: #ffffff;
      text-decoration: none;
      border-radius: 15px;
      padding: 13px 17px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.18s, transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(200,30,30,0.11) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.18s;
    }
    .btn:hover { border-color: rgba(220,45,45,0.65); transform: scale(0.984); }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: scale(0.972); }
    .icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon-wrap svg { width: 21px; height: 21px; }
    .btn-label { flex: 1; }
    .btn-arrow { font-size: 19px; color: rgba(255,255,255,0.18); transition: color 0.18s, transform 0.18s; line-height: 1; }
    .btn:hover .btn-arrow { color: rgba(220,45,45,0.75); transform: translateX(3px); }
    .btn:nth-child(1){animation:slide-in .45s ease .26s both}
    .btn:nth-child(2){animation:slide-in .45s ease .34s both}
    .btn:nth-child(3){animation:slide-in .45s ease .42s both}
    .btn:nth-child(4){animation:slide-in .45s ease .50s both}
  </style>
</head>
<body>

  <canvas id="particles"></canvas>
  <div class="glow-bar"></div>

  <div class="content">

    <img src="jordfordrs.png" alt="jordfordrs" class="logo" />

    <p class="name">JORDFORDRS</p>
    <p class="bio">Разборы Ford | Джордж RS</p>

    <div class="btns">

      <a class="btn" href="https://t.me/jordfordrs" target="_blank" rel="noopener">
        <div class="icon-wrap">
          <svg viewBox="0 0 21 21" fill="none">
            <path d="M1.8 10.1l14.1-5.5c.7-.25 1.35.12 1.05.95L14.7 16.3c-.2.65-.65.85-1.15.5l-3.25-2.4-1.55 1.45c-.2.18-.45.28-.68.28l.28-3.25 5.9-5.25c.3-.2 0-.38-.38-.18L6.5 11.8 3.2 10.85c-.65-.22-.65-.68.6-1.75z" fill="white"/>
          </svg>
        </div>
        <span class="btn-label">Telegram</span>
        <span class="btn-arrow">›</span>
      </a>

      <!-- ✏️ ЗАМЕНИ: вставь сюда ссылку на инсту, например https://instagram.com/jordfordrs -->
      <a class="btn" href="https://instagram.com/ВСТАВЬ_НИК_ИНСТА_СЮДА" target="_blank" rel="noopener">
        <div class="icon-wrap">
          <svg viewBox="0 0 21 21" fill="none">
            <rect x="2.5" y="2.5" width="16" height="16" rx="5.5" stroke="white" stroke-width="1.55"/>
            <circle cx="10.5" cy="10.5" r="3.8" stroke="white" stroke-width="1.55"/>
            <circle cx="15.6" cy="5.4" r="1.05" fill="white"/>
          </svg>
        </div>
        <span class="btn-label">Instagram</span>
        <span class="btn-arrow">›</span>
      </a>

      <a class="btn" href="https://www.tiktok.com/@georg_rs?_r=1&_t=ZS-97GgNLAXgyj" target="_blank" rel="noopener">
        <div class="icon-wrap">
          <svg viewBox="0 0 21 21" fill="none">
            <path d="M14.8 1.5h-2.85v11.7a2.2 2.2 0 01-2.2 2.2 2.2 2.2 0 01-2.2-2.2 2.2 2.2 0 012.2-2.2c.22 0 .43.03.63.08V8.2c-.2-.03-.42-.05-.63-.05a5.05 5.05 0 00-5.05 5.05 5.05 5.05 0 005.05 5.05 5.05 5.05 0 005.05-5.05V7.12a6.1 6.1 0 003.05.82V5.07c-1.52-.1-3.05-1.32-3.05-3.57z" fill="white"/>
          </svg>
        </div>
        <span class="btn-label">TikTok</span>
        <span class="btn-arrow">›</span>
      </a>

      <!-- ✏️ ЗАМЕНИ: вставь сюда ссылку на тредс, например https://www.threads.net/@jordfordrs -->
      <a class="btn" href="https://www.threads.net/@ВСТАВЬ_НИК_ТРЕДС_СЮДА" target="_blank" rel="noopener">
        <div class="icon-wrap">
          <svg viewBox="0 0 21 21" fill="none">
            <path d="M10.5 1.75a8.75 8.75 0 100 17.5 8.75 8.75 0 000-17.5z" stroke="white" stroke-width="1.4" fill="none"/>
            <path d="M13.8 10.2c0-.08-.01-.16-.02-.24-.17-1.6-1.22-2.6-2.88-2.6-1.04 0-1.91.5-2.42 1.36l1.18.73c.3-.49.73-.77 1.24-.77.82 0 1.35.5 1.48 1.38H11.1c-1.56 0-2.52.75-2.52 1.96 0 1.18.96 1.98 2.26 1.98.74 0 1.38-.3 1.84-.84.38.53.96.84 1.7.84l.02-.01v-1.54c-.1.02-.2.03-.28.03-.36 0-.64-.24-.8-.57.3-.37.48-.8.48-1.26v-.46zm-3.28 2.38c-.54 0-.9-.28-.9-.72 0-.44.36-.7 1.06-.7h1.1c-.14.83-.6 1.42-1.26 1.42z" fill="white"/>
          </svg>
        </div>
        <span class="btn-label">Threads</span>
        <span class="btn-arrow">›</span>
      </a>

    </div>
  </div>

  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const pts = Array.from({length: 45}, () => ({
      x: Math.random() * window.innerWidth,
      y: window.innerHeight * 0.3 + Math.random() * window.innerHeight * 0.8,
      r: 0.8 + Math.random() * 2.2,
      speed: 0.35 + Math.random() * 1.0,
      drift: (Math.random() - 0.5) * 0.4,
      op: 0.15 + Math.random() * 0.55,
      life: Math.random(),
    }));

    (function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pts.forEach(p => {
        p.y -= p.speed;
        p.x += p.drift;
        p.life += p.speed / canvas.height;
        const fade = p.life < 0.12 ? p.life / 0.12 : p.life > 0.82 ? (1 - p.life) / 0.18 : 1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${3 + Math.random()*18},88%,58%,${p.op * fade})`;
        ctx.fill();
        if (p.life >= 1) {
          p.x = Math.random() * canvas.width;
          p.y = canvas.height + 8;
          p.life = 0;
          p.speed = 0.35 + Math.random() * 1.0;
          p.r = 0.8 + Math.random() * 2.2;
        }
      });
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
